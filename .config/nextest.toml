[profile.default]
test-threads = "num-cpus"
status-level = "fail"
final-status-level = "fail"
failure-output = "final"

# Heavy runner-style tests JIT-compile many .aivi files with per-file timeouts.
# Running them all in parallel causes CPU contention and can trigger spurious
# timeouts or OS-level kills, so serialize them.
[test-groups.runner-jit]
max-threads = 1

[[profile.default.overrides]]
filter = 'binary_id(aivi::runner)'
test-group = 'runner-jit'

[[profile.default.overrides]]
filter = 'binary_id(aivi::stdlib_runner)'
test-group = 'runner-jit'
